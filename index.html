<style>
:root{
  --bg:#020617;
  --teal:#51c4ca;
  --pink:#ed1a8e;
  --white:#ffffff;
  --card:rgba(255,255,255,0.06);
  --card-border:rgba(255,255,255,0.12);
  --text-muted:rgba(255,255,255,0.45);
  --gradient:linear-gradient(135deg,#ed1a8e 0%,#51c4ca 100%);
  --gradient-soft:linear-gradient(135deg,rgba(237,26,142,0.15) 0%,rgba(81,196,202,0.15) 100%);
  /* legacy compat aliases */
  --black:#020617;
  --magenta:#ed1a8e;
  --yellow:#f0c040;
  --gray:rgba(255,255,255,0.45);
  --dimgray:rgba(255,255,255,0.2);
  --card2:rgba(255,255,255,0.09);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--white);font-family:'Poppins',sans-serif;min-height:100vh;font-size:15px;overflow-x:hidden;}
button{cursor:pointer;font-family:'Poppins',sans-serif;}
input,select,textarea{font-family:'Poppins',sans-serif;}
a{color:inherit;text-decoration:none;}
select option{background:#0d1b2a;color:#fff;}

/* SCROLLBARS */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(237,26,142,0.4);border-radius:2px;}

/* BLOBS */
.blob{
  position:fixed;
  border-radius:30% 70% 70% 30% / 30% 30% 70% 70%;
  animation:morph 10s ease-in-out infinite;
  pointer-events:none;
  z-index:0;
  filter:blur(40px);
  opacity:0.25;
}
.blob-1{width:500px;height:500px;background:#ed1a8e;top:-150px;right:-150px;animation-delay:0s;}
.blob-2{width:400px;height:400px;background:#51c4ca;bottom:-100px;left:-100px;animation-delay:-5s;}
.blob-3{width:250px;height:250px;background:linear-gradient(135deg,#ed1a8e,#51c4ca);top:40%;left:30%;animation-delay:-3s;opacity:0.12;}
@keyframes morph{
  0%,100%{border-radius:30% 70% 70% 30% / 30% 30% 70% 70%;transform:translate(0,0) scale(1);}
  25%{border-radius:58% 42% 75% 25% / 76% 46% 54% 24%;transform:translate(20px,-20px) scale(1.03);}
  50%{border-radius:50% 50% 33% 67% / 55% 27% 73% 45%;transform:translate(-10px,15px) scale(0.98);}
  75%{border-radius:33% 67% 58% 42% / 63% 68% 32% 37%;transform:translate(15px,10px) scale(1.02);}
}

/* GRADIENT TEXT */
.gradient-text{
  background:linear-gradient(135deg,#ed1a8e,#51c4ca);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

/* ===== LOGIN ===== */
#screen-login{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  background:transparent;
  position:relative;
  z-index:1;
}
.login-top{
  height:35vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-end;
  padding-bottom:24px;
  position:relative;
  z-index:1;
}
.login-orb{
  width:160px;height:160px;
  background:linear-gradient(135deg,#ed1a8e,#51c4ca);
  border-radius:50%;
  filter:blur(30px);
  opacity:0.7;
  margin:0 auto 24px;
  animation:float 6s ease-in-out infinite;
}
@keyframes float{
  0%,100%{transform:translateY(0) scale(1);}
  50%{transform:translateY(-20px) scale(1.05);}
}
.login-polar{
  font-size:72px;
  font-weight:800;
  line-height:1;
  letter-spacing:-2px;
  background:linear-gradient(135deg,#ed1a8e,#51c4ca);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.login-multi{
  font-size:16px;
  font-weight:500;
  color:rgba(255,255,255,0.6);
  letter-spacing:6px;
  text-transform:uppercase;
  margin-top:4px;
}
.login-line{
  width:120px;height:2px;
  background:linear-gradient(90deg,#ed1a8e,#51c4ca);
  margin-top:20px;
  border-radius:2px;
}
.login-bottom{
  flex:1;
  padding:32px 24px 40px;
  max-width:400px;
  width:100%;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  position:relative;
  z-index:1;
}
.login-glass{
  background:rgba(255,255,255,0.07);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:28px;
  padding:36px 32px;
}
.login-hub{
  font-size:11px;
  font-weight:700;
  letter-spacing:3px;
  text-transform:uppercase;
  background:linear-gradient(135deg,#ed1a8e,#51c4ca);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:28px;
}
.login-field{margin-bottom:24px;}
.login-field input{
  display:block;width:100%;
  background:transparent;
  border:none;
  border-bottom:2px solid rgba(255,255,255,0.15);
  color:var(--white);
  font-size:18px;
  font-family:'Poppins',sans-serif;
  padding:12px 0;
  outline:none;
  transition:border-color 0.3s,box-shadow 0.3s;
}
.login-field input:focus{
  border-bottom-color:#ed1a8e;
  box-shadow:0 2px 0 0 rgba(237,26,142,0.4);
}
.login-field input::placeholder{color:rgba(255,255,255,0.25);}
.login-btn{
  margin-top:8px;
  width:100%;height:56px;
  background:linear-gradient(135deg,#ed1a8e,#51c4ca);
  border:none;
  border-radius:50px;
  color:white;
  font-family:'Poppins',sans-serif;
  font-size:15px;
  font-weight:700;
  letter-spacing:1px;
  text-transform:uppercase;
  cursor:pointer;
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  box-shadow:0 4px 20px rgba(237,26,142,0.35);
  position:relative;
  overflow:hidden;
}
.login-btn::before{
  content:'';
  position:absolute;top:0;left:-100%;
  width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
  transition:left 0.5s;
}
.login-btn:hover::before{left:100%;}
.login-btn:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 8px 30px rgba(237,26,142,0.55);}
.login-btn:active{transform:translateY(-1px) scale(0.99);}
.login-error{
  margin-top:16px;
  font-size:13px;
  color:#ed1a8e;
  display:none;
  font-weight:500;
}
.login-divider{
  display:flex;align-items:center;gap:12px;
  margin-bottom:24px;
}
.login-divider-line{flex:1;height:1px;background:rgba(255,255,255,0.1);}
.login-divider-text{font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:1px;text-transform:uppercase;}

/* ===== APP ===== */
#app{display:none;min-height:100vh;position:relative;z-index:1;}
#banner-local{
  width:100%;
  background:linear-gradient(90deg,rgba(237,26,142,0.2),rgba(81,196,202,0.2));
  border-bottom:1px solid rgba(237,26,142,0.3);
  color:rgba(255,255,255,0.8);
  font-size:11px;
  font-weight:600;
  letter-spacing:1.5px;
  text-align:center;
  padding:10px;
  position:sticky;top:0;z-index:200;
}
#layout{display:flex;min-height:calc(100vh - 33px);}

/* SIDEBAR */
#sidebar{
  width:200px;
  background:rgba(2,6,23,0.7);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-right:1px solid rgba(255,255,255,0.08);
  padding:24px 0;
  flex-shrink:0;
  position:sticky;top:33px;
  height:calc(100vh - 33px);
  overflow-y:auto;
}
.sidebar-brand{
  font-size:18px;font-weight:700;
  background:linear-gradient(135deg,#ed1a8e,#51c4ca);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  padding:0 20px;margin-bottom:32px;
}
.sidebar-user{font-size:13px;color:var(--white);padding:0 20px;margin-bottom:8px;}
.sidebar-divider{height:1px;background:rgba(255,255,255,0.08);margin:12px 0;}
.sidebar-nav a{
  display:block;
  font-size:12px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;
  padding:14px 20px;
  color:rgba(255,255,255,0.35);
  text-decoration:none;cursor:pointer;
  transition:all 0.2s ease;
  border-left:3px solid transparent;
}
.sidebar-nav a:hover{color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.05);}
.sidebar-nav a.active{
  color:white;
  background:rgba(237,26,142,0.12);
  border-left:3px solid #ed1a8e;
  padding-left:17px;
}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;min-width:0;}
#topbar{
  height:56px;
  background:rgba(2,6,23,0.8);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.07);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
  position:sticky;top:33px;z-index:100;
}
.topbar-title{
  font-size:14px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  color:var(--white);
}
.topbar-right{font-size:13px;color:rgba(255,255,255,0.4);display:flex;align-items:center;gap:8px;}
.topbar-logout{cursor:pointer;color:rgba(255,255,255,0.3);transition:color 0.2s;}
.topbar-logout:hover{color:var(--white);}
#content{padding:24px;padding-bottom:80px;}

/* BOTTOM NAV */
#bottom-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  height:64px;
  background:rgba(2,6,23,0.85);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,0.08);
  z-index:150;
}
.bnav-inner{display:flex;height:100%;}
.bnav-item{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-size:10px;font-weight:600;
  letter-spacing:1px;text-transform:uppercase;
  color:rgba(255,255,255,0.35);
  cursor:pointer;
  border-top:2px solid transparent;
  transition:all 0.2s ease;
}
.bnav-item.active{
  color:transparent;
  background:linear-gradient(135deg,#ed1a8e,#51c4ca);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  border-top:2px solid #ed1a8e;
}

/* ROLE CHIPS */
.chip{
  display:inline-block;
  font-size:10px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;
  padding:4px 10px;border-radius:50px;
}
.chip-admin{background:rgba(81,196,202,0.2);color:#51c4ca;border:1px solid rgba(81,196,202,0.4);}
.chip-produccion{background:rgba(237,26,142,0.2);color:#ed1a8e;border:1px solid rgba(237,26,142,0.4);}
.chip-finanzas{background:rgba(240,192,64,0.2);color:#f0c040;border:1px solid rgba(240,192,64,0.4);}
.chip-campo{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.2);}

/* STATUS CHIPS */
.chip-status{
  display:inline-block;
  font-size:10px;font-weight:700;
  letter-spacing:1px;padding:4px 10px;
  border-radius:50px;text-transform:uppercase;
}
.chip-kickoff{background:rgba(81,196,202,0.15);color:#51c4ca;border:1px solid rgba(81,196,202,0.4);}
.chip-preprod{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.15);}
.chip-prod{background:rgba(237,26,142,0.15);color:#ed1a8e;border:1px solid rgba(237,26,142,0.4);}
.chip-logistica{background:rgba(240,192,64,0.15);color:#f0c040;border:1px solid rgba(240,192,64,0.4);}
.chip-cerrado{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.25);border:1px solid rgba(255,255,255,0.08);}
.chip-pagado{background:rgba(81,196,202,0.15);color:#51c4ca;border:1px solid rgba(81,196,202,0.4);}
.chip-pendiente{background:rgba(240,192,64,0.15);color:#f0c040;border:1px solid rgba(240,192,64,0.4);}
.chip-linea{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.2);}

/* METRIC CARDS */
.metrics-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px;}
@media(min-width:769px){.metrics-grid{grid-template-columns:repeat(4,1fr);}}
.metric-card{
  background:var(--card);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  padding:24px;
  transition:transform 0.2s ease,border-color 0.2s ease;
}
.metric-card:hover{transform:translateY(-4px);border-color:rgba(81,196,202,0.3);}
.metric-label{
  font-size:10px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,0.45);
  margin-bottom:8px;
}
.metric-value{
  font-size:52px;font-weight:800;
  line-height:1;
  background:linear-gradient(135deg,#ed1a8e,#51c4ca);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  margin:8px 0 4px;
}
.metric-value.teal{
  background:linear-gradient(135deg,#51c4ca,#51c4ca);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.metric-value.magenta{
  background:linear-gradient(135deg,#ed1a8e,#ed1a8e);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.metric-value.yellow{
  background:linear-gradient(135deg,#f0c040,#f0c040);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.metric-value.white{
  background:linear-gradient(135deg,#ffffff,rgba(255,255,255,0.8));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.metric-sub{font-size:12px;color:rgba(255,255,255,0.35);margin-top:6px;}

/* ALERT ROWS */
.alert-row{
  background:rgba(237,26,142,0.07);
  border-left:3px solid #ed1a8e;
  padding:16px 20px;
  margin-bottom:8px;
  border-radius:0 16px 16px 0;
  backdrop-filter:blur(8px);
}
.alert-big{font-size:18px;font-weight:700;color:var(--white);}
.alert-sub{font-size:13px;color:rgba(255,255,255,0.45);margin-top:4px;}
.section-title{
  font-size:11px;font-weight:700;
  letter-spacing:2.5px;text-transform:uppercase;
  background:linear-gradient(135deg,#ed1a8e,#51c4ca);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:16px;
}

/* ACTIVITY */
.activity-row{
  display:flex;justify-content:space-between;align-items:flex-start;
  border-bottom:1px solid rgba(255,255,255,0.06);
  padding:14px 0;
}
.act-left{}
.act-date{font-size:12px;color:#51c4ca;margin-bottom:2px;}
.act-name{font-size:15px;font-weight:700;color:var(--white);}
.act-concept{font-size:13px;color:rgba(255,255,255,0.45);}
.act-right{text-align:right;}
.act-amount{font-size:18px;font-weight:700;color:var(--white);}

/* FORMS */
.form-wrap{max-width:480px;}
.form-title{
  font-size:24px;font-weight:800;color:var(--white);
  margin-bottom:32px;
  letter-spacing:-0.5px;
}
.field{margin-bottom:28px;}
.field label{
  display:block;
  font-size:10px;font-weight:600;
  letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,0.4);
  margin-bottom:6px;
}
.field input,.field select,.field textarea{
  width:100%;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:12px;
  color:white;
  font-family:'Poppins',sans-serif;
  font-size:15px;
  padding:12px 16px;
  outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
  -webkit-appearance:none;
  appearance:none;
}
.field input:focus,.field select:focus{
  border-color:rgba(237,26,142,0.6);
  box-shadow:0 0 0 3px rgba(237,26,142,0.1);
}
.field input::placeholder{color:rgba(255,255,255,0.2);}
.field select option{background:#0d1b2a;}
.field-amount input{
  font-size:40px;font-weight:700;
  color:#51c4ca;
  background:rgba(255,255,255,0.04);
}
.field-amount-wrap{display:flex;align-items:baseline;gap:4px;}
.field-amount-prefix{
  font-size:40px;font-weight:700;
  background:linear-gradient(135deg,#ed1a8e,#51c4ca);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* AMOUNT INPUT BIG */
#g-amount{
  font-size:42px !important;font-weight:800 !important;
  background:linear-gradient(135deg,#ed1a8e,#51c4ca) !important;
  -webkit-background-clip:text !important;
  -webkit-text-fill-color:transparent !important;
  background-clip:text !important;
  border:none !important;
  border-bottom:2px solid rgba(237,26,142,0.4) !important;
  border-radius:0 !important;
  background-color:transparent !important;
  padding:8px 0 !important;
  text-align:center;
  box-shadow:none !important;
}
#g-amount:focus{
  border-bottom-color:#ed1a8e !important;
  box-shadow:0 2px 0 0 rgba(237,26,142,0.4) !important;
}

/* PILL GROUPS */
.pill-group{display:flex;flex-wrap:wrap;gap:8px;}
.pill{
  border-radius:50px;
  padding:6px 16px;
  font-size:11px;font-weight:600;
  letter-spacing:0.5px;
  border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.06);
  color:rgba(255,255,255,0.5);
  cursor:pointer;
  transition:all 0.2s ease;
  font-family:'Poppins',sans-serif;
  text-transform:uppercase;
}
.pill:hover{border-color:rgba(255,255,255,0.3);color:rgba(255,255,255,0.8);}
.pill.sel-teal,.pill.selected-teal{
  background:rgba(81,196,202,0.2);
  border-color:#51c4ca;
  color:#51c4ca;
  box-shadow:0 0 12px rgba(81,196,202,0.3);
}
.pill.sel-yellow{
  background:rgba(240,192,64,0.2);
  border-color:#f0c040;
  color:#f0c040;
  box-shadow:0 0 12px rgba(240,192,64,0.3);
}
.pill.sel-white{
  background:rgba(255,255,255,0.15);
  border-color:rgba(255,255,255,0.6);
  color:white;
  box-shadow:0 0 12px rgba(255,255,255,0.15);
}
.pill.sel-magenta,.pill.selected-pink{
  background:rgba(237,26,142,0.2);
  border-color:#ed1a8e;
  color:#ed1a8e;
  box-shadow:0 0 12px rgba(237,26,142,0.3);
}

/* BUTTONS */
.btn-save{
  display:block;width:100%;height:56px;
  background:linear-gradient(135deg,#ed1a8e,#51c4ca);
  border:none;
  border-radius:50px;
  color:white;
  font-family:'Poppins',sans-serif;
  font-size:15px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;
  margin-top:32px;
  cursor:pointer;
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  box-shadow:0 4px 20px rgba(237,26,142,0.35);
  position:relative;overflow:hidden;
}
.btn-save::before{
  content:'';position:absolute;top:0;left:-100%;
  width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
  transition:left 0.5s;
}
.btn-save:hover::before{left:100%;}
.btn-save:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 8px 30px rgba(237,26,142,0.55);}
.btn-save:active{transform:translateY(-1px) scale(0.99);}
.btn-outline{
  display:block;width:100%;height:48px;
  background:transparent;
  border:none;outline:none;
  color:#51c4ca;
  font-family:'Poppins',sans-serif;
  font-size:13px;font-weight:600;
  letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;
  transition:all 0.3s ease;
  box-shadow:inset 0 0 0 1.5px rgba(81,196,202,0.6);
  border-radius:50px;
  padding:0 28px;
}
.btn-outline:hover{
  background:rgba(81,196,202,0.1);
  box-shadow:inset 0 0 0 1.5px #51c4ca,0 0 20px rgba(81,196,202,0.3);
  transform:translateY(-2px);
}
.btn-magenta{
  background:linear-gradient(135deg,#ed1a8e,#c0157a);
  color:#fff;border:none;border-radius:50px;
  font-family:'Poppins',sans-serif;
  font-size:13px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;
  padding:12px 24px;cursor:pointer;
  transition:all 0.2s ease;
}
.btn-magenta:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(237,26,142,0.4);}
.btn-primary{
  background:linear-gradient(135deg,#ed1a8e,#51c4ca);
  border:none;border-radius:50px;
  color:white;
  font-family:'Poppins',sans-serif;
  font-weight:700;font-size:15px;
  letter-spacing:1px;text-transform:uppercase;
  padding:16px 32px;cursor:pointer;
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  box-shadow:0 4px 20px rgba(237,26,142,0.35);
  position:relative;overflow:hidden;
}
.btn-primary::before{
  content:'';position:absolute;top:0;left:-100%;
  width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);
  transition:left 0.5s;
}
.btn-primary:hover::before{left:100%;}
.btn-primary:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 8px 30px rgba(237,26,142,0.55);}

/* EXPENSE LIST */
.expense-row{
  padding:16px;
  border-bottom:1px solid rgba(255,255,255,0.06);

  border-radius:12px;

}

.exp-top{display:flex;justify-content:space-between;align-items:flex-start;}
.exp-date{font-size:12px;color:#51c4ca;}
.exp-concept{font-size:15px;font-weight:700;color:var(--white);}
.exp-amount{font-size:18px;font-weight:700;color:var(--white);}
.exp-bottom{display:flex;justify-content:space-between;margin-top:4px;}
.exp-meta{font-size:12px;color:rgba(255,255,255,0.35);}
.exp-expand{display:none;padding:12px 0;border-top:1px solid rgba(255,255,255,0.06);margin-top:8px;}
.btn-delete{

}
.btn-delete:hover{opacity:0.7;}

/* EVENT CARDS */
.event-card{
  background:var(--card);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.1);

  padding:24px;
  margin-bottom:12px;

}
.event-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(237,26,142,0.15);}
.event-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.event-name{font-size:24px;font-weight:700;color:var(--white);margin:12px 0 4px;}
.event-client{font-size:14px;color:#51c4ca;margin-bottom:2px;}
.event-type{font-size:13px;color:rgba(255,255,255,0.3);}
.event-divider{height:1px;background:rgba(255,255,255,0.06);margin:16px 0;}
.event-row{display:flex;gap:32px;margin-bottom:8px;}
.event-field{}
.event-field-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.35);}
.event-field-val{font-size:16px;color:var(--white);margin-top:4px;}
.event-budget{font-size:28px;font-weight:700;color:var(--white);}
.event-margin{font-size:28px;font-weight:700;}
.event-progress-bar{height:4px;background:rgba(255,255,255,0.1);border-radius:2px;margin:12px 0 4px;overflow:hidden;}
.event-progress-fill{height:100%;border-radius:2px;transition:width 0.3s;background:linear-gradient(90deg,#ed1a8e,#51c4ca);}
.event-detail-link{font-size:12px;color:rgba(255,255,255,0.35);cursor:pointer;text-align:right;display:block;margin-top:8px;transition:color 0.2s;}
.event-detail-link:hover{color:#51c4ca;}

/* SLIDE PANEL */
#slide-panel{
  position:fixed;top:0;right:0;bottom:0;
  width:min(640px,100vw);
  background:rgba(2,6,23,0.95);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-left:1px solid rgba(255,255,255,0.1);
  z-index:300;
  transform:translateX(100%);
  transition:transform 0.3s ease;
  overflow-y:auto;
  padding:32px 28px;
}
#slide-panel.open{transform:translateX(0);}
.panel-close{
  font-size:12px;font-weight:700;color:rgba(255,255,255,0.4);
  cursor:pointer;display:inline-block;margin-bottom:24px;
  letter-spacing:1px;text-transform:uppercase;
  transition:color 0.2s;
}
.panel-close:hover{color:var(--white);}
.budget-table{width:100%;margin:20px 0;}
.budget-table tr td{
  padding:14px 0;
  border-bottom:1px solid rgba(255,255,255,0.06);
  font-size:18px;font-weight:700;
}
.budget-table tr td:first-child{font-size:13px;color:rgba(255,255,255,0.4);font-weight:400;}
.etapa-pills{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0;}

/* OVERLAY MODAL */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(2,6,23,0.95);backdrop-filter:blur(20px);z-index:400;overflow-y:auto;padding:24px;}
#modal-overlay.open{display:block;}
.modal-close{
  font-size:12px;font-weight:700;color:rgba(255,255,255,0.4);
  cursor:pointer;margin-bottom:24px;display:inline-block;
  letter-spacing:1px;text-transform:uppercase;
  transition:color 0.2s;
}
.modal-close:hover{color:var(--white);}

/* FLUJO */
.cards-strip{display:flex;gap:12px;overflow-x:auto;margin:24px 0;padding-bottom:8px;}
.card-strip-item{
  background:var(--card);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.1);
  min-width:140px;padding:16px;border-radius:16px;flex-shrink:0;
  transition:transform 0.2s;
}
.card-strip-item:hover{transform:translateY(-2px);}
.card-strip-name{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:8px;}
.card-strip-divider{height:1px;background:rgba(255,255,255,0.06);margin-bottom:8px;}
.card-strip-sublabel{font-size:10px;color:rgba(255,255,255,0.35);}
.card-strip-days{
  font-size:32px;font-weight:800;line-height:1;

}

.filter-pills{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
.filter-pill{
  font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  padding:6px 14px;border-radius:50px;
  cursor:pointer;background:transparent;
  border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.35);
  transition:all 0.2s ease;

}
.filter-pill:hover{border-color:rgba(255,255,255,0.3);color:rgba(255,255,255,0.7);}
.filter-pill.active{
  border-color:#51c4ca;

  background:rgba(81,196,202,0.15);
  box-shadow:0 0 12px rgba(81,196,202,0.2);
}
.payment-item{
  background:var(--card);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  padding:20px;margin-bottom:8px;
  display:flex;justify-content:space-between;align-items:flex-start;
  transition:transform 0.2s,border-color 0.2s;
}
.payment-item:hover{transform:translateY(-2px);border-color:rgba(81,196,202,0.3);}
.pay-left{}
.pay-day{
  font-size:40px;font-weight:800;line-height:1;display:inline-block;
  background:linear-gradient(135deg,#ed1a8e,#51c4ca);

}
.pay-month{font-size:12px;color:rgba(255,255,255,0.35);display:block;}
.pay-concept{font-size:18px;font-weight:700;color:var(--white);margin-top:8px;}
.pay-event{font-size:13px;color:rgba(255,255,255,0.35);}
.pay-method{font-size:13px;color:#51c4ca;}
.pay-right{text-align:right;}
.pay-amount{font-size:24px;font-weight:700;color:var(--white);}
.btn-mark-paid{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  color:#ed1a8e;background:none;border:none;cursor:pointer;margin-top:8px;
  transition:opacity 0.2s;font-family:'Poppins',sans-serif;
}
.btn-mark-paid:hover{opacity:0.7;}
.fab{
  position:fixed;bottom:80px;right:24px;
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,#ed1a8e,#51c4ca);
  border:none;color:#fff;font-size:24px;font-weight:700;
  z-index:140;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(237,26,142,0.5);
  transition:all 0.3s ease;
}
.fab:hover{transform:scale(1.1);box-shadow:0 8px 30px rgba(237,26,142,0.7);}

/* FINANZAS TABS */
.fin-tabs{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:24px;}
.fin-tab{
  font-size:12px;font-weight:700;
  padding:12px 20px;cursor:pointer;
  color:rgba(255,255,255,0.35);

  transition:all 0.2s ease;

}
.fin-tab:hover{color:rgba(255,255,255,0.7);}
.fin-tab.active{
  color:#51c4ca;

}
.loan-card{
  background:var(--card);

  padding:24px;margin-bottom:12px;
  transition:transform 0.2s,border-color 0.2s;
}
.loan-card:hover{transform:translateY(-2px);border-color:rgba(237,26,142,0.3);}
.loan-name{font-size:24px;font-weight:700;color:var(--white);}
.loan-rate{font-size:13px;color:#51c4ca;margin:4px 0;}
.loan-balance{
  font-size:36px;font-weight:800;
  background:linear-gradient(135deg,#ed1a8e,#ed1a8e);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.loan-interest{
  font-size:24px;font-weight:700;
  background:linear-gradient(135deg,#f0c040,#f0c040);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.invoice-row{
  background:var(--card);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  padding:20px;margin-bottom:8px;
  display:flex;justify-content:space-between;align-items:flex-start;
  transition:transform 0.2s,border-color 0.2s;
}
.invoice-row:hover{transform:translateY(-2px);border-color:rgba(81,196,202,0.3);}
.inv-total{
  font-size:20px;font-weight:700;
  background:linear-gradient(135deg,#51c4ca,#51c4ca);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* CONFIG */
.config-section{margin-bottom:40px;}
.config-title{
  font-size:11px;font-weight:700;
  letter-spacing:2.5px;text-transform:uppercase;
  background:linear-gradient(135deg,#ed1a8e,#51c4ca);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:16px;
}
.user-row{
  background:var(--card);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.1);

}
.firebase-input{margin-bottom:16px;}
.firebase-input label{
  font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,0.4);display:block;margin-bottom:6px;
}
.firebase-input input{
  width:100%;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:10px;color:var(--white);
  font-family:'Poppins',sans-serif;
  font-size:14px;padding:10px 14px;outline:none;
  transition:border-color 0.2s;
}
.firebase-input input:focus{border-color:rgba(237,26,142,0.5);}
.firebase-status{font-size:13px;font-weight:700;padding:12px 0;letter-spacing:1px;}
.status-local{color:#f0c040;}

/* TOAST */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:rgba(2,6,23,0.95);
  backdrop-filter:blur(20px);
  border:1px solid rgba(81,196,202,0.4);
  border-radius:16px;
  box-shadow:0 8px 32px rgba(0,0,0,0.4),0 0 0 1px rgba(81,196,202,0.1);
  color:white;
  font-family:'Poppins',sans-serif;
  font-size:13px;font-weight:500;
  padding:14px 24px;
  z-index:9999;
  transition:opacity 0.4s;
  white-space:nowrap;
}
.toast.toast-magenta{border-color:rgba(237,26,142,0.5);}
.toast.toast-yellow{border-color:rgba(240,192,64,0.5);}

/* BUDGET PREVIEW */
.budget-preview{
  background:rgba(81,196,202,0.06);
  border:1px solid rgba(81,196,202,0.2);
  border-radius:16px;
  padding:20px;margin:16px 0;
}
.budget-preview-row{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;}
.budget-preview-row.subtotal{border-top:1px solid rgba(255,255,255,0.06);margin-top:8px;padding-top:12px;font-weight:700;}
.budget-preview-row.total{font-size:17px;font-weight:700;color:#51c4ca;}
.budget-preview-row.suggested{font-size:17px;font-weight:700;color:#ed1a8e;}

/* RESPONSIVE */
@media(max-width:768px){
  #sidebar{display:none;}

  #content{padding:16px;padding-bottom:80px;}
  .metrics-grid{grid-template-columns:repeat(2,1fr);}
  #topbar{top:33px;}
  .login-glass{border-radius:20px;padding:28px 20px;}
}

/* BOTTOM SHEET */
#bottom-sheet{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(2,6,23,0.97);
  backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,0.1);
  z-index:500;padding:24px;
  max-height:70vh;overflow-y:auto;
  border-radius:24px 24px 0 0;
}
#bottom-sheet.open{display:block;}
.sheet-handle{width:40px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:0 auto 20px;}

/* ── AI RECEIPT SCANNER ─────────────────────────────── */
.scan-zone {
  border: 2px dashed rgba(237,26,142,0.4);
  border-radius: 20px;
  padding: 28px 20px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s ease;
  background: rgba(237,26,142,0.04);
  margin-bottom: 24px;
  position: relative;
}
.scan-zone.drag-over {
  border-color: #ed1a8e;
  background: rgba(237,26,142,0.12);
  transform: scale(1.01);
}
.scan-zone input[type=file] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.scan-icon {
  font-size: 40px;
  margin-bottom: 10px;
  display: block;
}
.scan-title {
  font-size: 15px;
  font-weight: 700;
  color: white;
  margin-bottom: 4px;
}
.scan-sub {
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  margin-bottom: 16px;
}
.scan-btn-row {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}
.scan-btn {
  padding: 10px 20px;
  border-radius: 50px;
  border: 1.5px solid rgba(237,26,142,0.5);
  background: transparent;
  color: #ed1a8e;
  font-family: 'Poppins', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  letter-spacing: 0.5px;
}
.scan-btn:hover {
  background: rgba(237,26,142,0.15);
  border-color: #ed1a8e;
}
.scan-preview-wrap {
  display: none;
  margin-bottom: 20px;
  border-radius: 16px;
  overflow: hidden;
  position: relative;
  max-height: 220px;
}
.scan-preview-wrap img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  display: block;
}
.scan-preview-wrap .scan-remove {
  position: absolute;
  top: 10px; right: 10px;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.scan-analyze-btn {
  width: 100%;
  padding: 14px;
  border-radius: 50px;
  border: none;
  background: linear-gradient(135deg, #ed1a8e, #51c4ca);
  color: white;
  font-family: 'Poppins', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 20px;
  box-shadow: 0 4px 20px rgba(237,26,142,0.3);
}
.scan-analyze-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.scan-analyze-btn:not(:disabled):hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(237,26,142,0.5);
}
.scan-result-banner {
  display: none;
  background: rgba(81,196,202,0.1);
  border: 1px solid rgba(81,196,202,0.3);
  border-radius: 14px;
  padding: 14px 18px;
  margin-bottom: 20px;
  font-size: 13px;
  color: #51c4ca;
  font-weight: 500;
}
.scan-result-banner.error {
  background: rgba(237,26,142,0.1);
  border-color: rgba(237,26,142,0.3);
  color: #ed1a8e;
}
.expense-thumb {
  width: 48px; height: 48px;
  border-radius: 10px;
  object-fit: cover;
  border: 1px solid rgba(255,255,255,0.15);
  flex-shrink: 0;
}
.analyzing-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(2,6,23,0.85);
  backdrop-filter: blur(10px);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  display: none;
}
.analyzing-orb {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: linear-gradient(135deg, #ed1a8e, #51c4ca);
  animation: pulse-orb 1.5s ease-in-out infinite;
  margin-bottom: 24px;
  filter: blur(4px);
}
@keyframes pulse-orb {
  0%,100% { transform: scale(1); opacity: 0.8; }
  50% { transform: scale(1.2); opacity: 1; }
}
.analyzing-text {
  font-size: 18px; font-weight: 700; color: white;
  letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 8px;
}
.analyzing-sub { font-size: 13px; color: rgba(255,255,255,0.5); }

/* ── EVENT WIZARD ─────────────────────────────────── */
.wizard-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(2,6,23,0.92);
  backdrop-filter: blur(12px);
  display: none; flex-direction: column;
  overflow-y: auto;
}
.wizard-overlay.open { display: flex; }
.wizard-wrap {
  max-width: 520px; width: 100%;
  margin: auto; padding: 24px 20px 48px;
}
.wizard-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 28px;
}
.wizard-title {
  font-size: 22px; font-weight: 800; color: white;
}
.wizard-close {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.08); border: none;
  color: white; font-size: 18px; cursor: pointer;

function formatMXN(n){
  if(isNaN(n)||n===null||n===undefined)return '$0';
  return new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN',minimumFractionDigits:0,maximumFractionDigits:0}).format(n);
}
function daysUntil(dateStr){
  var today=new Date(); today.setHours(0,0,0,0);
  var d=new Date(dateStr+'T00:00:00');
  return Math.round((d-today)/(1000*60*60*24));
}
function uid(){return '_'+Math.random().toString(36).substr(2,9);}

function monthStr(dateStr){
  if(!dateStr)return'';
  var m=['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
  var d=new Date(dateStr+'T00:00:00');
  return m[d.getMonth()];
}

function showToast(msg,type){

function nextCutDate(cutDay){
  var today=new Date(); today.setHours(0,0,0,0);
  var d=new Date(today.getFullYear(),today.getMonth(),cutDay);
  if(d<=today)d=new Date(today.getFullYear(),today.getMonth()+1,cutDay);
  return d;
}
function daysToNextCut(cutDay){
  var today=new Date(); today.setHours(0,0,0,0);
  var d=nextCutDate(cutDay);
  return Math.round((d-today)/(1000*60*60*24));
}

}

function doLogin(){
  var email = document.getElementById('login-email').value.trim().toLowerCase();
  var pass  = document.getElementById('login-pass').value.trim();
  var errEl = document.getElementById('login-error');

  if(fbConnected && fbAuth){
    // Firebase email/password login
    errEl.style.display='none';
    fbAuth.signInWithEmailAndPassword(email, pass)
      .then(function(){ /* onAuthStateChanged handles the rest */ })
      .catch(function(err){
        // Firebase login failed — fallback to localStorage users
        var users = getUsers();
        var user = users.find(function(u){ return u.email.toLowerCase()===email && u.password===pass; });
        if(user){
          lsSave('polar_current_user',{id:user.id,name:user.name,role:user.role,email:user.email,assignedEvents:user.assignedEvents||[]});
          trackEvent('login','auth',user.role+'_local');
          showApp();
        } else {
          errEl.style.display='block';
          errEl.textContent='Correo o contraseña incorrectos.';
        }
      });
  } else {
    // Pure localStorage login
    var users = getUsers();
    var user = users.find(function(u){ return u.email.toLowerCase()===email && u.password===pass; });
    if(!user){
      errEl.style.display='block';
      errEl.textContent='Correo o contraseña incorrectos. Verifica mayúsculas.';
      console.log('Login attempt:', email, '| Users:', users.map(function(u){return u.email;}));
      return;
    }
    lsSave('polar_current_user',{id:user.id,name:user.name,role:user.role,email:user.email,assignedEvents:user.assignedEvents||[]});
    trackEvent('login','auth',user.role);
    showApp();
  }
}
function doGoogleLogin(){
  if(!fbConnected || !fbAuth){
    showToast('Conectando Firebase... intenta en unos segundos o usa correo.','yellow');
    console.warn('fbConnected:', fbConnected, 'fbAuth:', fbAuth);
    return;
  }
  var provider = new firebase.auth.GoogleAuthProvider();
  provider.setCustomParameters({ hd: 'polarmultimedia.com' });
  fbAuth.signInWithPopup(provider)
    .then(function(result){
      trackEvent('login','auth','google');
    })
    .catch(function(err){
      console.error('Google login error:', err.code, err.message);
      if(err.code === 'auth/popup-blocked'){
        showToast('Popup bloqueado — permite popups en tu navegador.','yellow');
      } else if(err.code === 'auth/cancelled-popup-request' || err.code === 'auth/popup-closed-by-user'){
        // usuario cerró el popup — ignorar
      } else if(err.code === 'auth/unauthorized-domain'){
        showToast('Dominio no autorizado. Agrégalo en Firebase Auth → Dominios autorizados.','yellow');
      } else {
        showToast('Error Google: '+err.message,'yellow');
      }
    });
}
function doLogout(){
  localStorage.removeItem('polar_current_user');
  if(fbConnected && fbAuth){
    fbAuth.signOut().catch(function(){});
  }
  document.getElementById('app').style.display='none';
  document.getElementById('screen-login').style.display='flex';
  document.getElementById('login-email').value='';
  document.getElementById('login-pass').value='';
}

function showApp(){
  document.getElementById('screen-login').style.display='none';
  document.getElementById('app').style.display='block';
  var user=getCurrentUser();
  buildNav(user);
  updateTopbar(user);
  switchTab('inicio');
}
function buildNav(user){
  var visibleTabs=TABS.filter(function(t){return t.roles.indexOf(user.role)>=0;});
  // sidebar
  document.getElementById('sb-user').textContent=user.name;
  document.getElementById('sb-chip').innerHTML=chipRole(user.role);
  var sbNav=document.getElementById('sb-nav');
  sbNav.innerHTML=visibleTabs.map(function(t){
    return '<a data-tab="'+t.id+'" onclick="switchTab(\''+t.id+'\')" class="'+(currentTab===t.id?'active':'')+'">'+t.label+'</a>';
  }).join('');
  // bottom nav
  document.getElementById('bnav').innerHTML=visibleTabs.map(function(t){
    return '<div class="bnav-item'+(currentTab===t.id?' active':'')+'" onclick="switchTab(\''+t.id+'\')" data-tab="'+t.id+'">'+t.label+'</div>';
  }).join('');
}
function updateTopbar(user){
  document.getElementById('tb-user').textContent=user.name+' · ';
  document.getElementById('tb-chip').innerHTML=chipRole(user.role);
}
function switchTab(id){
  currentTab=id;
  var user=getCurrentUser();
  trackEvent('tab_view','navegacion',id);
  // update nav active
  document.querySelectorAll('[data-tab]').forEach(function(el){
    el.classList.toggle('active',el.dataset.tab===id);
  });
  var titles={inicio:'INICIO',gasto:'NUEVO GASTO',eventos:'EVENTOS',flujo:'FLUJO DE PAGOS',finanzas:'FINANZAS',config:'CONFIGURACIÓN'};
  document.getElementById('tb-title').textContent=titles[id]||id.toUpperCase();
  // render
  var content=document.getElementById('content');
  content.innerHTML=renderTab(id,user);
  // remove FAB if not flujo
  var existingFab=document.getElementById('flujo-fab');
  if(existingFab)existingFab.remove();
  if(id==='flujo'){
    var fab=document.createElement('button');
    fab.id='flujo-fab';
    fab.className='fab';
    fab.innerHTML='+';
    fab.onclick=openNewPaymentSheet;
    document.body.appendChild(fab);
  }
  initTabEvents(id);
}

// ============================================================
// RENDER TABS
// ============================================================
function renderTab(id,user){
  if(id==='inicio')return renderInicio(user);
  if(id==='gasto')return renderGasto(user);
  if(id==='eventos')return renderEventos(user);
  if(id==='flujo')return renderFlujo(user);
  if(id==='finanzas')return renderFinanzas(user);
  if(id==='config')return renderConfig(user);
  return'';
}

// ---- INICIO ----
function renderInicio(user){
  if(user.role==='campo')return renderInicioField(user);
  var events=getUserEvents(user);
  var expenses=getExpenses();
  var payments=getPayments();
  var invoices=getInvoices();
  // metrics
  var activeEvents=events.filter(function(e){return e.status!=='Cerrado';}).length;
  var prodCount=events.filter(function(e){return e.status==='Producción';}).length;
  var totalReceivable=invoices.reduce(function(s,i){return s+(i.status==='Pendiente'?i.total:0);},0);
  var today=new Date(); today.setHours(0,0,0,0);
  var weekEnd=new Date(today); weekEnd.setDate(today.getDate()+7);
  var weekPayments=payments.filter(function(p){
    var d=new Date(p.dueDate+'T00:00:00');
    return d>=today&&d<=weekEnd&&p.status==='Pendiente';
  });
  var weekPayAmt=weekPayments.reduce(function(s,p){return s+p.amount;},0);
  var todayExpenses=expenses.filter(function(e){return e.date===today.toISOString().slice(0,10);});
  var todayAmt=todayExpenses.reduce(function(s,e){return s+e.amount;},0);
  var html='<div class="metrics-grid">';
  html+='<div class="metric-card"><div class="metric-label">EVENTOS ACTIVOS</div><div class="metric-value teal">'+activeEvents+'</div><div class="metric-sub">'+prodCount+' en producción</div></div>';
  html+='<div class="metric-card"><div class="metric-label">POR COBRAR</div><div class="metric-value magenta">'+formatMXN(totalReceivable).replace('$','').replace(' MXN','')+'</div><div class="metric-sub">'+invoices.filter(function(i){return i.status==='Pendiente';}).length+' facturas</div></div>';
  html+='<div class="metric-card"><div class="metric-label">PAGOS ESTA SEMANA</div><div class="metric-value yellow">'+formatMXN(weekPayAmt).replace('$','').replace(' MXN','')+'</div><div class="metric-sub">'+weekPayments.length+' vencimientos</div></div>';
  html+='<div class="metric-card"><div class="metric-label">GASTOS HOY</div><div class="metric-value white">'+formatMXN(todayAmt).replace('$','').replace(' MXN','')+'</div><div class="metric-sub">'+todayExpenses.length+' movimientos</div></div>';
  html+='</div>';
  // alerts
  html+='<div class="section-title" style="margin-top:8px;">ALERTAS</div>';
  var alerts=[];
  payments.filter(function(p){return p.status==='Pendiente';}).forEach(function(p){
    var d=daysUntil(p.dueDate);
    if(d<=14){
      var ev=events.find(function(e){return e.id===p.eventId;})||{name:'—'};
      alerts.push({days:d,text:'PAGO EN '+d+' DÍAS — '+formatMXN(p.amount),sub:p.concept+' · '+ev.name});
    }
  });
  if(alerts.length===0){
    html+='<div style="text-align:center;padding:32px 0;font-size:28px;font-weight:700;color:var(--teal);">SIN ALERTAS</div>';
  } else {
    alerts.sort(function(a,b){return a.days-b.days;});
    alerts.forEach(function(a){
      html+='<div class="alert-row"><div class="alert-big">'+esc(a.text)+'</div><div class="alert-sub">'+esc(a.sub)+'</div></div>';
    });
  }
  // recent
  html+='<div class="section-title" style="margin-top:24px;">ACTIVIDAD RECIENTE</div>';
  var recentExp=getExpenses().slice().sort(function(a,b){return b.date.localeCompare(a.date);}).slice(0,8);
  recentExp.forEach(function(e){
    var ev=events.find(function(ev){return ev.id===e.eventId;})||{name:'—'};
    html+='<div class="activity-row"><div class="act-left"><div class="act-date">'+esc(e.date)+'</div><div class="act-name">'+esc(ev.name)+'</div><div class="act-concept">'+esc(e.concept)+'</div></div>';
    html+='<div class="act-right"><div class="act-amount">'+formatMXN(e.amount)+'</div>'+chipStatus(e.status)+'</div></div>';
  });
  return html;
}

  html+='<div style="font-size:13px;font-weight:700;letter-spacing:2px;color:var(--gray);margin-bottom:20px;">SELECCIONA EVENTO</div>';

function renderEventos(user){

    html+='<div class="event-row">';
    html+='<div class="event-field"><div class="event-field-label">FECHA DEL EVENTO</div><div class="event-field-val">'+fmtDateRange(ev)+'</div></div>';
    html+='<div class="event-field"><div class="event-field-label">ASISTENTES</div><div class="event-field-val">'+esc(ev.attendees)+'</div></div>';
    html+='</div>';
    html+='<div class="event-row" style="align-items:flex-end;">';
    html+='<div class="event-field"><div class="event-field-label">PRESUPUESTO</div><div class="event-budget">'+formatMXN(budget)+'</div></div>';
    html+='<div class="event-field"><div class="event-field-label">MARGEN</div><div class="event-margin" style="color:'+fillColor+';">'+(margin*100).toFixed(0)+'%</div></div>';
    html+='</div>';
    html+='<div class="event-progress-bar"><div class="event-progress-fill" style="width:'+Math.min(100,pct*100).toFixed(1)+'%;background:'+fillColor+';"></div></div>';

    html+='</div>';
  });
  return html;
}

// ---- FLUJO ----
function renderFlujo(user){
  var config=getConfig();
  var payments=getPayments();
  var total=payments.reduce(function(s,p){return s+p.amount;},0);
  var paid=payments.filter(function(p){return p.status==='Pagado';}).reduce(function(s,p){return s+p.amount;},0);
  var pending=payments.filter(function(p){return p.status==='Pendiente';}).reduce(function(s,p){return s+p.amount;},0);
  var html='<div class="metrics-grid" style="grid-template-columns:repeat(3,1fr);">';
  html+='<div class="metric-card"><div class="metric-label">PROGRAMADO</div><div class="metric-value white" style="font-size:32px;">'+formatMXN(total)+'</div></div>';
  html+='<div class="metric-card"><div class="metric-label">PAGADO</div><div class="metric-value teal" style="font-size:32px;">'+formatMXN(paid)+'</div></div>';
  html+='<div class="metric-card"><div class="metric-label">PENDIENTE</div><div class="metric-value yellow" style="font-size:32px;">'+formatMXN(pending)+'</div></div>';
  html+='</div>';
  // card cuts
  html+='<div class="cards-strip">';
  (config.cards||[]).forEach(function(c){
    var d=daysToNextCut(c.cutDay);
    html+='<div class="card-strip-item"><div class="card-strip-name">'+esc(c.name)+'</div><div class="card-strip-divider"></div>';
    html+='<div class="card-strip-sublabel">CORTE EN</div><div class="card-strip-days">'+d+'</div><div class="card-strip-day">DÍA '+c.cutDay+'</div></div>';
  });
  html+='</div>';
  // filters
  var filterOpts=['TODOS','ESTA SEMANA','ESTE MES','AMEX POLAR','AMEX ROBERTO','BANAMEX','BBVA'];
  html+='<div class="filter-pills">';
  filterOpts.forEach(function(f){
    var fid=f.toLowerCase().replace(/ /g,'-');
    html+='<div class="filter-pill'+(payFilter===fid?' active':'')+'" onclick="setPayFilter(\''+fid+'\')" data-filter="'+fid+'">'+esc(f)+'</div>';
  });
  html+='</div>';
  // payment list
  var filtered=filterPayments(payments,payFilter);
  filtered.sort(function(a,b){return a.dueDate.localeCompare(b.dueDate);});
  var events=getEvents();
  filtered.forEach(function(p){
    var ev=events.find(function(e){return e.id===p.eventId;})||{name:'—'};
    html+='<div class="payment-item">';
    html+='<div class="pay-left"><div><span class="pay-day">'+dayNum(p.dueDate)+'</span><span class="pay-month">'+monthStr(p.dueDate)+'</span></div>';
    html+='<div class="pay-concept">'+esc(p.concept)+'</div>';
    html+='<div class="pay-event">'+esc(ev.name)+'</div><div class="pay-method">'+esc(p.paymentMethod)+'</div>';
    if(p.status==='Pendiente')html+='<button class="btn-mark-paid" onclick="markPaymentPaid(\''+p.id+'\')">MARCAR PAGADO</button>';
    html+='</div>';
    html+='<div class="pay-right"><div class="pay-amount">'+formatMXN(p.amount)+'</div>'+chipStatus(p.status)+'</div>';
    html+='</div>';
  });
  return html;
}
function filterPayments(payments,filter){
  var today=new Date(); today.setHours(0,0,0,0);
  var weekEnd=new Date(today); weekEnd.setDate(today.getDate()+7);
  var monthEnd=new Date(today.getFullYear(),today.getMonth()+1,0);
  return payments.filter(function(p){
    if(filter==='todos')return true;
    if(filter==='esta-semana'){var d=new Date(p.dueDate+'T00:00:00');return d>=today&&d<=weekEnd;}
    if(filter==='este-mes'){var d=new Date(p.dueDate+'T00:00:00');return d>=today&&d<=monthEnd;}
    if(filter==='amex-polar')return p.paymentMethod==='AmEx Polar';
    if(filter==='amex-roberto')return p.paymentMethod==='AmEx Roberto';
    if(filter==='banamex')return p.paymentMethod==='Banamex Blanca';
    if(filter==='bbva')return p.paymentMethod==='BBVA';
    return true;
  });
}

// ---- FINANZAS ----
function renderFinanzas(user){
  var tabs=['TARJETAS','PRÉSTAMOS','CxC'];
  var html='<div class="fin-tabs">';
  tabs.forEach(function(t){
    var id=t==='PRÉSTAMOS'?'prestamos':t==='CxC'?'cxc':'tarjetas';
    html+='<div class="fin-tab'+(finTab===id?' active':'')+'" onclick="setFinTab(\''+id+'\')">'+esc(t)+'</div>';
  });
  html+='</div>';
  if(finTab==='tarjetas')html+=renderTarjetas();
  else if(finTab==='prestamos')html+=renderPrestamos();
  else html+=renderCxC();
  return html;
}

function renderPrestamos(){
  var config=getConfig();
  var loans=config.loans||[];
  var totalDebt=loans.reduce(function(s,l){return s+(l.totalOwed-l.paid);},0);
  var html='';
  loans.forEach(function(l){
    var balance=l.totalOwed-l.paid;
    var monthlyInterest=balance*l.rate/100;
    html+='<div class="loan-card">';
    html+='<div class="metric-label">'+esc(l.creditor.toUpperCase())+'</div>';
    html+='<div class="loan-name">'+esc(l.creditor)+'</div>';
    html+='<div class="loan-rate">'+(l.rate>0?l.rate+'% mensual':'Sin interés')+'</div>';
    html+='<div style="height:1px;background:#222;margin:12px 0;"></div>';
    html+='<div style="display:flex;gap:32px;align-items:flex-end;">';
    html+='<div><div class="metric-label">SALDO PENDIENTE</div><div class="loan-balance">'+formatMXN(balance)+'</div></div>';
    if(monthlyInterest>0)html+='<div><div class="metric-label">INTERÉS/MES</div><div class="loan-interest">'+formatMXN(monthlyInterest)+'</div></div>';
    html+='</div></div>';
  });
  html+='<div style="text-align:right;margin-top:16px;"><div style="font-size:13px;font-weight:700;letter-spacing:2px;color:var(--gray);">DEUDA TOTAL</div><div style="font-size:40px;font-weight:700;color:var(--magenta);">'+formatMXN(totalDebt)+'</div></div>';
  return html;
}
function renderCxC(){
  var invoices=getInvoices();
  var total=invoices.filter(function(i){return i.status==='Pendiente';}).reduce(function(s,i){return s+i.total;},0);
  var html='';

function saveExpense(){
  var user=getCurrentUser();
  var date=document.getElementById('g-date').value;
  var eventId=document.getElementById('g-event').value;
  var concept=document.getElementById('g-concept').value.trim();
  var amount=parseFloat(document.getElementById('g-amount').value)||0;
  var rubro=document.getElementById('g-rubro').value;
  var method=getPillVal('g-method');
  var status=getPillVal('g-status');
  var invoice=document.getElementById('g-invoice').value.trim();
  if(!concept||!amount||!eventId){showToast('Completa los campos requeridos','yellow');return;}
  var expenses=getExpenses();
  var newExp={id:uid(),eventId:eventId,date:date,concept:concept,amount:amount,rubro:rubro,paymentMethod:method,status:status,invoice:invoice||'Sin factura',createdBy:user.id,imageData:(scanImageData && scanImageData.thumbnail) ? scanImageData.thumbnail : null};
  expenses.push(newExp);
  lsSave('polar_expenses',expenses);
  // Sync to Firestore if connected
  if(fbConnected && fbDb){
    fbDb.collection('expenses').doc(newExp.id).set(newExp).catch(function(e){ console.warn('Firestore write failed:',e); });
  }
  // update event realSpent
  var events=getEvents();
  var evIdx=events.findIndex(function(e){return e.id===eventId;});
  if(evIdx>=0){
    var evExpenses=expenses.filter(function(x){return x.eventId===eventId;});
    events[evIdx].realSpent=evExpenses.reduce(function(s,x){return s+x.amount;},0);
    lsSave('polar_events',events);
    if(fbConnected && fbDb){
      fbDb.collection('events').doc(events[evIdx].id).set(events[evIdx]).catch(function(e){ console.warn('Firestore write failed:',e); });
    }
  }
  trackEvent('gasto_guardado','gastos',rubro,amount);
  showToast('✓ GASTO GUARDADO');
  scanImageData = null;
  document.getElementById('g-concept').value='';
  document.getElementById('g-amount').value='';
  document.getElementById('g-invoice').value='';
  expandedExpense=null;
  switchTab('gasto');
}

function generateBudget1(type,city,attendees){
  var c=CATALOG.catering[city]||CATALOG.catering.default;
  var av=CATALOG.av[city]||CATALOG.av.default;
  var hospUnit=CATALOG.hospedaje[city]||CATALOG.hospedaje.default;
  var catItems=[];
  var isCena=type.toLowerCase().indexOf('cena')>=0;
  var isCongreso=type.toLowerCase().indexOf('congreso')>=0||type.toLowerCase().indexOf('summit')>=0||type.toLowerCase().indexOf('cumbre')>=0;
  if(isCena){
    catItems=[
      {label:'Cena '+attendees+' × '+formatMXN(c.cena),total:attendees*c.cena},
      {label:'Barra '+attendees+' × '+formatMXN(c.barra),total:attendees*c.barra}
    ];
  } else {
    catItems=[
      {label:'Desayuno '+attendees+' × '+formatMXN(c.desayuno),total:attendees*c.desayuno},
      {label:'Comida '+attendees+' × '+formatMXN(c.comida),total:attendees*c.comida},
      {label:'Coffee ×2 '+attendees+' × '+formatMXN(c.coffee)+'×2',total:attendees*c.coffee*2}
    ];
  }
  var catSubtotal=catItems.reduce(function(s,i){return s+i.total;},0);
  var hosTotal=isCena?0:attendees*hospUnit;
  var avTotal=av.paquete;
  var prodTotal=CATALOG.produccion.branding+(attendees*CATALOG.produccion.libreta);
  var total=catSubtotal+avTotal+(isCena?0:hosTotal);
  if(isCongreso)total+=prodTotal;
  var suggested=Math.round(total/0.5/1000)*1000;
  return{catering:{items:catItems,subtotal:catSubtotal},av:{paquete:avTotal},hospedaje:hosTotal,hospedajeUnit:hospUnit,produccion:isCongreso?prodTotal:0,total:Math.round(total),suggested:suggested};
}

var scanImageData = null; // { base64, mediaType, dataUrl }

function compressImage(file, maxPx, quality, callback){
  var reader = new FileReader();
  reader.onload = function(e){
    var img = new Image();
    img.onload = function(){
      var canvas = document.createElement('canvas');
      var ratio = Math.min(maxPx/img.width, maxPx/img.height, 1);
      canvas.width  = Math.round(img.width  * ratio);
      canvas.height = Math.round(img.height * ratio);
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      var dataUrl = canvas.toDataURL('image/jpeg', quality);
      var base64  = dataUrl.split(',')[1];
      callback({ base64: base64, mediaType: 'image/jpeg', dataUrl: dataUrl });
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function handleScanFile(file){
  if(!file || !file.type.startsWith('image/')){ showToast('Selecciona una imagen','yellow'); return; }
  // Show preview
  compressImage(file, 1200, 0.85, function(compressed){
    scanImageData = compressed;
    var wrap = document.getElementById('scan-preview-wrap');
    var img  = document.getElementById('scan-preview-img');
    if(wrap && img){
      img.src = compressed.dataUrl;
      wrap.style.display = 'block';
    }
    var analyzeBtn = document.getElementById('scan-analyze-btn');
    if(analyzeBtn) analyzeBtn.disabled = false;
    // Hide zone
    var zone = document.getElementById('scan-zone');
    if(zone) zone.style.display = 'none';
    hideScanResult();
  });
}

function removeScanImage(){
  scanImageData = null;
  var wrap = document.getElementById('scan-preview-wrap');
  var zone = document.getElementById('scan-zone');
  var btn  = document.getElementById('scan-analyze-btn');
  if(wrap) wrap.style.display = 'none';
  if(zone) zone.style.display = 'block';
  if(btn)  btn.disabled = true;
  hideScanResult();
}

function showScanResult(msg, isError){
  var el = document.getElementById('scan-result-banner');
  if(!el) return;
  el.textContent = msg;
  el.className   = 'scan-result-banner' + (isError ? ' error' : '');
  el.style.display = 'block';
}
function hideScanResult(){
  var el = document.getElementById('scan-result-banner');
  if(el) el.style.display = 'none';
}

async function analyzeReceipt(){
  if(!scanImageData){ showToast('Primero sube una imagen','yellow'); return; }
  var cfg    = getConfig();
  var apiKey = cfg.openaiKey || '';
  if(!apiKey.trim()){
    showScanResult('⚠️ Configura tu OpenAI API Key en CONFIG → Inteligencia Artificial', true);
    return;
  }
  // Show overlay
  var overlay = document.getElementById('analyzing-overlay');
  if(overlay) overlay.style.display = 'flex';
  try {
    var response = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey.trim()
      },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        max_tokens: 512,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image_url',
              image_url: { url: 'data:' + scanImageData.mediaType + ';base64,' + scanImageData.base64 }
            },
            {
              type: 'text',
              text: 'Eres asistente de control de gastos para una empresa mexicana de producción de eventos llamada Polar Multimedia.\nAnaliza este comprobante/ticket/factura y extrae la información.\nResponde ÚNICAMENTE con JSON válido, sin explicaciones:\n{\n  "concepto": "descripción breve del gasto (máx 50 chars)",\n  "monto": numero_total_en_pesos_sin_simbolo,\n  "fecha": "YYYY-MM-DD o null",\n  "proveedor": "nombre del negocio",\n  "rubro": "uno de exactamente: Sede / Hospedaje / Catering / Traslado aéreo / Traslado terrestre / Producción · Materiales / Equipo A/V / Promocionales / Personal / Viáticos · Varios / Oficina"\n}'
            }
          ]
        }]
      })
    });
    if(!response.ok){
      var errText = await response.text();
      throw new Error('API error ' + response.status + ': ' + errText.substring(0,300));
    }
    var data = await response.json();
    var raw  = data.choices[0].message.content.trim();
    // Extract JSON even if wrapped in ```
    var jsonMatch = raw.match(/\{[\s\S]*\}/);
    if(!jsonMatch) throw new Error('Respuesta no es JSON válido');
    var result = JSON.parse(jsonMatch[0]);
    // Auto-fill form
    if(result.concepto){ var c=document.getElementById('g-concept'); if(c) c.value=result.concepto; }
    if(result.monto){    var m=document.getElementById('g-amount');  if(m) m.value=result.monto; }
    if(result.fecha){
      var d=document.getElementById('g-date');
      if(d && result.fecha !== 'null' && result.fecha) d.value=result.fecha;
    }
    if(result.rubro){
      var r=document.getElementById('g-rubro');
      if(r) r.value=result.rubro;
    }
    // Store thumbnail (compressed small for storage)
    compressImage(dataURLtoFile(scanImageData.dataUrl,'receipt.jpg'), 400, 0.65, function(thumb){
      scanImageData.thumbnail = thumb.dataUrl;
    });
    showScanResult('✅ Recibo analizado: ' + (result.proveedor||'') + ' — $' + (result.monto||'') + '. Revisa y confirma los datos.', false);
    trackEvent('receipt_scanned','ai','gpt4o_vision');
  } catch(err){
    console.error('Receipt scan error:', err);
    showScanResult('❌ ' + err.message, true);
  } finally {
    if(overlay) overlay.style.display = 'none';
  }
}

function dataURLtoFile(dataUrl, filename){
  var arr=dataUrl.split(','), mime=arr[0].match(/:(.*?);/)[1];
  var bstr=atob(arr[1]), n=bstr.length, u8=new Uint8Array(n);
  while(n--){ u8[n]=bstr.charCodeAt(n); }
  return new File([u8], filename, {type:mime});
}

// Drag & drop setup (called after render)
function initScanZone(){
  var zone     = document.getElementById('scan-zone');
  var fileInput= document.getElementById('scan-file-input');
  var camInput = document.getElementById('scan-cam-input');
  if(!zone) return;
  zone.addEventListener('dragover',function(e){ e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave',function(){ zone.classList.remove('drag-over'); });
  zone.addEventListener('drop',function(e){
    e.preventDefault(); zone.classList.remove('drag-over');
    var f=e.dataTransfer.files[0]; if(f) handleScanFile(f);
  });
  if(fileInput) fileInput.addEventListener('change',function(e){ handleScanFile(e.target.files[0]); });
  if(camInput)  camInput.addEventListener('change', function(e){ handleScanFile(e.target.files[0]); });
}

  WIZ_STEPS.forEach(function(s,i){

    dots += '<div class="wizard-step-dot '+cls+'"></div>';
  });
  document.getElementById('wiz-dots').innerHTML = dots;

  var html = '<div class="wizard-step-label">PASO '+(wizardStep+1)+' DE '+WIZ_STEPS.length+' \u2014 <span>'+WIZ_STEPS[wizardStep]+'</span></div>';

  if(wizardStep===0){
    html += '<div class="wizard-hint"><strong>¿Qué tipo de evento es?</strong> El tipo determina qué recursos necesitas. Una cumbre nacional requiere vuelos y hospedaje; una cena con charla médica no.</div>';

    html += '<div class="field"><label>Ciudad</label><select id="wiz-city"><option>CDMX</option><option>GDL</option><option>MTY</option><option>Nacional (varias sedes)</option><option>Internacional</option><option>Virtual</option></select></div>';

    html += '</div>';
    html += '<div class="wizard-nav"><button class="btn-next" onclick="wizardNext()">SIGUIENTE \u2192</button></div>';
  }

  else if(wizardStep===1){
    var isMultiDay = ['Cumbre / Summit','Congreso médico','Simposio','Congreso educativo','Lanzamiento de producto'].indexOf(wizardState.type) >= 0;
    html += '<div class="wizard-hint">';
    if(isMultiDay){
      html += '<strong>'+wizardState.type+'</strong> típicamente dura 2\u20133 días. Define la fecha de inicio y la fecha de finalización para controlar el flujo de pagos correctamente.';
    } else {
      html += '<strong>'+wizardState.type+'</strong> es un evento de un día. La fecha de fin es opcional \u2014 úsala si el montaje/desmontaje ocupa días adicionales.';
    }
    html += '</div>';
    html += '<div class="wizard-section">';
    html += '<div class="dates-row">';
    html += '<div class="field"><label>Fecha de inicio</label><input type="date" id="wiz-fi" value="'+esc(wizardState.fechaInicio)+'"></div>';
    html += '<div class="field"><label>Fecha de fin <span class="optional-label">opcional</span></label><input type="date" id="wiz-ff" value="'+esc(wizardState.fechaFin)+'"></div>';
    html += '</div>';
    if(isMultiDay){
      html += '<div class="wizard-hint" style="margin-top:12px">\uD83D\uDCA1 <strong>Recordatorio:</strong> para cumbres y congresos, la fecha de inicio es cuando llegan los primeros invitados (check-in + cena de bienvenida), no el día de las sesiones.</div>';
    }
    html += '<div class="field"><label>Estado actual</label><select id="wiz-status"><option>Invitación a pitch</option><option>Kickoff</option><option>Pre-producción</option><option>Producción</option><option>Día del evento</option><option>Post-evento</option><option>Entrega</option><option>Cobro</option><option>Cerrado</option></select></div>';
    html += '</div>';
    html += '<div class="wizard-nav"><button class="btn-back" onclick="wizardBack()">\u2190 Atrás</button><button class="btn-next" onclick="wizardNext()">SIGUIENTE \u2192</button></div>';
  }

  else if(wizardStep===2){
    var users = getUsers();
    html += '<div class="wizard-hint">Asigna el equipo que trabajará en este evento. Solo verán este evento en su vista de producción.</div>';
    html += '<div class="wizard-section">';
    users.forEach(function(u){
      if(u.role==='campo') return;
      var checked = wizardState.assignedTo.indexOf(u.id) >= 0;
      html += '<label style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:rgba(255,255,255,0.04);border-radius:12px;margin-bottom:8px;cursor:pointer;border:1px solid rgba(255,255,255,'+(checked?'0.2':'0.06')+')">';

    });
    html += '</div>';
    html += '<div class="wizard-nav"><button class="btn-back" onclick="wizardBack()">\u2190 Atrás</button><button class="btn-next" onclick="wizardNext()">SIGUIENTE \u2192</button></div>';
  }

  else if(wizardStep===3){
    var catalog = CATALOG;
    var city = wizardState.city.split(' ')[0]; // GDL, CDMX, MTY

    var av    = catalog.av[city]       || catalog.av['default'];
    var hosp  = catalog.hospedaje[city]|| catalog.hospedaje['default'];

    var type  = wizardState.type;

    var estCatering=0, estAV=0, estHosp=0, estVuelos=0, estPersonal=0, estProd=0;
    var isMultiDay  = ['Cumbre / Summit','Congreso médico','Simposio','Congreso educativo'].indexOf(type)>=0;
    var isNational  = ['Cumbre / Summit','Congreso médico','Simposio'].indexOf(type)>=0;
    var isDigital   = ['Webinar / Virtual','Campaña digital'].indexOf(type)>=0;

    if(!isDigital){
      estCatering = isMultiDay ? pax*cat.fullday*2 : pax*cat.fullday;
      estAV       = av.paquete;
      estPersonal = 2 * (catalog.personal[city]||catalog.personal['default']);
      estProd     = 15000;
    }

      estVuelos = Math.round(pax*0.3)*catalog.traslado.vuelo;
    }
    var total = estCatering+estAV+estHosp+estVuelos+estPersonal+estProd;

    html += '<div class="dates-row">';
    html += '<div class="field"><label>Presup 1 \u2014 Preliminar</label><input type="number" id="wiz-b1" value="'+(wizardState.budget1||suggested||'')+'" placeholder="0"></div>';
    html += '<div class="field"><label>Presup 2 \u2014 Licitación</label><input type="number" id="wiz-b2" value="'+(wizardState.budget2||'')+'" placeholder="0"></div>';
    html += '</div>';

    html += '</div>';
    var saveLabel = wizardEditId ? 'GUARDAR CAMBIOS \u2713' : 'CREAR EVENTO \u2713';
    html += '<div class="wizard-nav"><button class="btn-back" onclick="wizardBack()">\u2190 Atrás</button><button class="btn-next" onclick="wizardSave()">'+saveLabel+'</button></div>';
  }

  document.getElementById('wiz-body').innerHTML = html;

  // Restore select values after render
  if(wizardStep===0){
    var sel = document.getElementById('wiz-type'); if(sel) sel.value = wizardState.type;
    var sc  = document.getElementById('wiz-city'); if(sc)  sc.value = wizardState.city;
  }
  if(wizardStep===1){
    var ss = document.getElementById('wiz-status'); if(ss) ss.value = wizardState.status;
  }
}

function wizardCollect(){
  if(wizardStep===0){
    var n = document.getElementById('wiz-name');
    if(n && !n.value.trim()){ showToast('Ingresa el nombre del evento','yellow'); return false; }
    wizardState.name      = document.getElementById('wiz-name').value.trim();
    wizardState.client    = document.getElementById('wiz-client').value.trim();
    wizardState.type      = document.getElementById('wiz-type').value;
    wizardState.city      = document.getElementById('wiz-city').value;
    wizardState.attendees = parseInt(document.getElementById('wiz-att').value)||0;
  }
  if(wizardStep===1){
    var fi = document.getElementById('wiz-fi');
    if(fi && !fi.value){ showToast('Ingresa la fecha de inicio','yellow'); return false; }
    wizardState.fechaInicio = document.getElementById('wiz-fi').value;
    wizardState.fechaFin    = document.getElementById('wiz-ff').value;
    wizardState.status      = document.getElementById('wiz-status').value;
  }
  if(wizardStep===2){
    // collected via wizardToggleUser
  }
  if(wizardStep===3){
    wizardState.budget1 = parseFloat(document.getElementById('wiz-b1').value)||0;
    wizardState.budget2 = parseFloat(document.getElementById('wiz-b2').value)||0;
    wizardState.budget3 = parseFloat(document.getElementById('wiz-b3').value)||0;
  }
  return true;
}

function wizardNext(){
  if(!wizardCollect()) return;
  wizardStep = Math.min(wizardStep+1, WIZ_STEPS.length-1);
  renderWizardStep();
  document.getElementById('event-wizard').scrollTop = 0;
}
function wizardBack(){
  wizardStep = Math.max(wizardStep-1, 0);
  renderWizardStep();
  document.getElementById('event-wizard').scrollTop = 0;
}
function wizardToggleUser(cb){
  var id = cb.value;
  var idx = wizardState.assignedTo.indexOf(id);
  if(cb.checked && idx<0) wizardState.assignedTo.push(id);
  if(!cb.checked && idx>=0) wizardState.assignedTo.splice(idx,1);
}

function wizardSave(){
  if(!wizardCollect()) return;
  var events = getEvents();
  if(wizardEditId){
    // EDIT
    var idx = events.findIndex(function(e){ return e.id===wizardEditId; });
    if(idx>=0){
      Object.assign(events[idx], wizardState);
      events[idx].date = wizardState.fechaInicio; // keep legacy field
    }
  } else {
    // CREATE
    var newEv = {
      id: uid(),
      name:        wizardState.name,
      client:      wizardState.client,
      type:        wizardState.type,
      city:        wizardState.city,
      attendees:   wizardState.attendees,
      fechaInicio: wizardState.fechaInicio,
      fechaFin:    wizardState.fechaFin,
      date:        wizardState.fechaInicio,
      status:      wizardState.status,
      budget1:     wizardState.budget1,
      budget2:     wizardState.budget2,
      budget3:     wizardState.budget3,
      realSpent:   0,
      assignedTo:  wizardState.assignedTo,
      createdAt:   new Date().toISOString().slice(0,10)
    };
    events.push(newEv);
  }
  lsSave('polar_events', events);
  if(fbConnected && fbDb){
    var toSync = wizardEditId ? events.find(function(e){return e.id===wizardEditId;}) : events[events.length-1];
    if(toSync) fbDb.collection('events').doc(toSync.id).set(toSync).catch(function(){});
  }
  closeWizard();
  showToast(wizardEditId ? '\u2713 Evento actualizado' : '\u2713 Evento creado');
  trackEvent(wizardEditId?'event_edited':'event_created','eventos',wizardState.type);
  switchTab('eventos');
}

function fmt(n){ return new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN',maximumFractionDigits:0}).format(n); }

function fmtDateRange(ev){
  var fi = ev.fechaInicio || ev.date || '';
  var ff = ev.fechaFin    || '';
  if(!fi) return '\u2014';
  function fmtD(d){
    if(!d) return '';
    var p = d.split('-');
    var months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    return parseInt(p[2])+' '+months[parseInt(p[1])-1]+' '+p[0];
  }
  if(ff) return fmtD(fi)+' \u2192 '+fmtD(ff);
  return fmtD(fi);
}

// ============================================================
// INIT
// ============================================================
function initApp(){
  seedDemoData();
  if(fbConnected && fbAuth){
    // Hide local banner — Firebase is connected
    document.getElementById('banner-local').style.display='none';
    // Listen for Firebase auth state
    fbAuth.onAuthStateChanged(function(fbUser){
      if(fbUser){
        // User signed in via Firebase — load/create their profile
        fbDb.collection('users').doc(fbUser.uid).get().then(function(doc){
          var profile;
          if(doc.exists){
            profile = doc.data();
          } else {
            // New user — create profile with default role
            var adminEmails = ['carpinteyro@polarmultimedia.com'];
            var finanzasEmails = ['blanca.puebla@polarmultimedia.com'];
            var role = adminEmails.indexOf(fbUser.email) >= 0 ? 'admin'
                     : finanzasEmails.indexOf(fbUser.email) >= 0 ? 'finanzas'
                     : 'produccion';
            profile = {id:fbUser.uid, name:fbUser.displayName||fbUser.email.split('@')[0], email:fbUser.email, role:role, assignedEvents:[]};
            fbDb.collection('users').doc(fbUser.uid).set(profile);
          }
          lsSave('polar_current_user', profile);
          showApp();
        }).catch(function(){ showApp(); });
      } else {
        // No Firebase user — check localStorage fallback
        var localUser = getCurrentUser();
        if(localUser){
          showApp();
        } else {
          showLoginScreen();
        }
      }
    });
  } else {
    // Firebase not available — pure localStorage mode
    document.getElementById('banner-local').style.display='block';
    var user = getCurrentUser();
    if(user){ showApp(); } else { showLoginScreen(); }
  }
}

function showLoginScreen(){
  document.getElementById('screen-login').style.display='flex';
  document.getElementById('app').style.display='none';
  var lp = document.getElementById('login-pass');
  if(lp){
    lp.onkeydown = function(e){ if(e.key==='Enter') doLogin(); };
  }
  var le = document.getElementById('login-email');
  if(le){
    le.onkeydown = function(e){ if(e.key==='Enter') document.getElementById('login-pass').focus(); };
  }
}

document.addEventListener('DOMContentLoaded',initApp);
</script>
